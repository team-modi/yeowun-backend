services:
  mysql:
    image: 'mysql:8.4'
    container_name: modi-mysql
    environment:
      - 'MYSQL_DATABASE=mydatabase'
      - 'MYSQL_PASSWORD=secret'
      - 'MYSQL_ROOT_PASSWORD=verysecret'
      - 'MYSQL_USER=myuser'
    ports:
      - '3306:3306'
    volumes:
      - 'mysql-data:/var/lib/mysql'
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-uroot', '-pverysecret']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # The application service is gated behind the "app" compose profile so that
  # Spring Boot's dev-time docker-compose integration (during `./gradlew bootRun`)
  # only starts MySQL. Run the full stack with:  docker compose --profile app up --build
  app:
    build:
      context: .
    container_name: modi-backend
    profiles: ['app']
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - 'SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/mydatabase'
      - 'SPRING_DATASOURCE_USERNAME=myuser'
      - 'SPRING_DATASOURCE_PASSWORD=secret'
      # 비어 있으면 default 프로파일(=로컬 CORS). 운영 배포는 .env로 prod 주입(=Vercel CORS).
      - 'SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-}'
      # OAuth/JWT 시크릿: .env로 주입(배포 시 GitHub Actions secrets → deploy.yml이 .env에 기록).
      # client-id·redirect-uri·CORS는 application.yaml prod 기본값(공개 정보)이라 여기서 안 넣는다.
      # ⚠️ 빈 문자열을 넘기면 application.yaml의 `${VAR:기본값}`이 "변수 존재"로 보고 빈값을 써버린다.
      #    특히 JWT_SECRET이 빈값이면 0바이트 키로 부팅 크래시(WeakKeyException) → .env 없이도 뜨도록 로컬 기본값 폴백.
      - 'KAKAO_CLIENT_SECRET=${KAKAO_CLIENT_SECRET:-}'
      - 'GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}'
      - 'JWT_SECRET=${JWT_SECRET:-local-dev-only-jwt-secret-please-change-min-32-bytes}'
      # AI 감상문 생성용 Anthropic 키(.env로 주입). 비어 있으면 AI 엔드포인트만 503, 나머지는 정상.
      - 'ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}'
      # 전시 장르 AI 분류(Gemini). 미설정(빈값)이면 AI 분류기가 random으로 폴백 → 크래시 없음.
      #   model·base-url은 여기서 넘기지 않는다 — 빈값을 넘기면 application.yaml 기본값(gemini-2.5-flash 등)을 덮어써 버림.
      - 'GEMINI_API_KEY=${GEMINI_API_KEY:-}'
      # record-AI 감상문 provider·키(gemini 사용 시 AI_PROVIDER=gemini, AI_API_KEY=Gemini 키).
      #   미설정이면 claude/빈키 → AI 엔드포인트만 503, 나머지 정상.
      - 'AI_PROVIDER=${AI_PROVIDER:-claude}'
      - 'AI_API_KEY=${AI_API_KEY:-}'
      # 공공데이터(전시) 인증키는 application.yaml에 기본값으로 박아 뒀다 → compose에서 CULTURE_API_KEY를 주입하지 않는다.
      #   (여기서 `CULTURE_API_KEY=${CULTURE_API_KEY:-}`로 빈값을 넘기면 Spring이 "변수 존재=빈값"으로 보고 yaml 기본값을 덮어써 버림.)
      #   env로 바꾸고 싶으면 이 줄을 살리되 반드시 실제 값이 채워질 때만 넘길 것.
    ports:
      # 호스트 노출 포트는 env로 바꾼다. 로컬은 기본 18090(8080은 다른 로컬 컨테이너와 충돌 잦음, README·Postman과 일치),
      # 운영(EC2 배포)은 deploy.yml의 .env가 APP_HOST_PORT=8080을 주입해 공개 주소·헬스체크(localhost:8080)와 맞춘다.
      - '${APP_HOST_PORT:-18090}:8080'

  # 관측 에이전트(Grafana Alloy) — 앱 /actuator/prometheus 스크랩 → Grafana Cloud remote_write.
  # 별도 'obs' 프로파일이라 자격증명(GC_*) 없이도 기존 `--profile app` 실행은 그대로 동작한다.
  # 사용:  docker compose --profile app --profile obs up -d   (.env에 GC_* 채운 뒤)
  alloy:
    image: 'grafana/alloy:latest'
    container_name: modi-alloy
    profiles: ['obs']
    depends_on:
      - app
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
    volumes:
      - './observability/config.alloy:/etc/alloy/config.alloy:ro'
    environment:
      # Grafana Cloud 자격증명(.env / GitHub Actions secrets). 비어 있으면 remote_write 실패하므로 obs 프로파일을 켜지 말 것.
      - 'GC_PROM_URL=${GC_PROM_URL:-}'
      - 'GC_PROM_USER=${GC_PROM_USER:-}'
      - 'GC_API_KEY=${GC_API_KEY:-}'
      # 인스턴스 라벨(환경 구분). 로컬은 기본 modi-backend-local, 운영은 deploy.yml이 modi-backend-prod 주입.
      - 'GC_INSTANCE=${GC_INSTANCE:-}'
    ports:
      # Alloy 자체 UI/디버그. 외부 노출 금지 → 루프백에만 바인딩.
      - '127.0.0.1:12345:12345'
    restart: unless-stopped

volumes:
  mysql-data:
