services:
  mysql:
    image: 'mysql:8.4'
    container_name: modi-mysql
    environment:
      - 'MYSQL_DATABASE=mydatabase'
      - 'MYSQL_PASSWORD=secret'
      - 'MYSQL_ROOT_PASSWORD=verysecret'
      - 'MYSQL_USER=myuser'
    ports:
      - '3306:3306'
    volumes:
      - 'mysql-data:/var/lib/mysql'
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-uroot', '-pverysecret']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # The application service is gated behind the "app" compose profile so that
  # Spring Boot's dev-time docker-compose integration (during `./gradlew bootRun`)
  # only starts MySQL. Run the full stack with:  docker compose --profile app up --build
  app:
    build:
      context: .
    container_name: modi-backend
    profiles: ['app']
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - 'SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/mydatabase'
      - 'SPRING_DATASOURCE_USERNAME=myuser'
      - 'SPRING_DATASOURCE_PASSWORD=secret'
      # 비어 있으면 default 프로파일(=로컬 CORS). 운영 배포는 .env로 prod 주입(=Vercel CORS).
      - 'SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-}'
      # OAuth/JWT 시크릿: .env로 주입(배포 시 GitHub Actions secrets → deploy.yml이 .env에 기록).
      # client-id·redirect-uri·CORS는 application.yaml prod 기본값(공개 정보)이라 여기서 안 넣는다.
      # ⚠️ 빈 문자열을 넘기면 application.yaml의 `${VAR:기본값}`이 "변수 존재"로 보고 빈값을 써버린다.
      #    특히 JWT_SECRET이 빈값이면 0바이트 키로 부팅 크래시(WeakKeyException) → .env 없이도 뜨도록 로컬 기본값 폴백.
      - 'KAKAO_CLIENT_SECRET=${KAKAO_CLIENT_SECRET:-}'
      - 'GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}'
      - 'JWT_SECRET=${JWT_SECRET:-local-dev-only-jwt-secret-please-change-min-32-bytes}'
    ports:
      - '8080:8080'

volumes:
  mysql-data:
