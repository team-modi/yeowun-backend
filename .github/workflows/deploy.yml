name: Deploy to EC2

# main에 push/merge되면 테스트를 먼저 돌리고(test), 통과한 경우에만 EC2에 배포한다.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reset_db:
        description: '⚠️ true면 EC2 mysql 볼륨을 삭제한 뒤 재배포(DB 초기화). Flyway 최초 도입/스키마 리셋 전용 — 평소 배포는 반드시 false!'
        type: boolean
        default: false

concurrency:
  group: deploy-ec2
  cancel-in-progress: false

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Run tests
        run: |
          chmod +x gradlew
          ./gradlew test --no-daemon

  deploy:
    needs: test          # 테스트가 통과해야만 배포
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # 전시 영업시간(구글 Places New). 운영만 실호출(.env의 PLACE_HOURS_PROVIDER=google과 짝). 미설정이면 앱이 mock로 폴백.
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          # record-AI 감상문/질문 AI = Claude(Anthropic, 유료). 아래 .env의 AI_PROVIDER=claude와 짝을 이룬다.
          #   무료 한도 소진으로 유료 전환(장르 분류는 계속 무료 Gemini). 개인 .env 의존 금지 → 이 시크릿에서만 주입.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Grafana Cloud(관측). GC_API_KEY가 있으면 obs 프로파일이 켜진다(메트릭). 미설정이면 앱만 배포.
          GC_PROM_URL: ${{ secrets.GC_PROM_URL }}
          GC_PROM_USER: ${{ secrets.GC_PROM_USER }}
          GC_API_KEY: ${{ secrets.GC_API_KEY }}
          # 로그(Loki) — 이 둘까지 등록되면 컨테이너 로그도 함께 전송(Phase 2). 없으면 로그만 스킵.
          GC_LOKI_URL: ${{ secrets.GC_LOKI_URL }}
          GC_LOKI_USER: ${{ secrets.GC_LOKI_USER }}
          # Metabase(사용자 지표) 외부 공개용 Cloudflare Tunnel 토큰(named, 고정 주소·도메인 필요). 있으면 metabase+cloudflared 기동.
          CF_TUNNEL_TOKEN: ${{ secrets.CF_TUNNEL_TOKEN }}
          MB_SITE_URL: ${{ secrets.MB_SITE_URL }}
          # (대안) 도메인 없이 quick tunnel로 metabase 공개. "true"면 활성(URL은 배포 로그/컨테이너 로그에서 확인, 재시작 시 변경).
          CF_QUICK_TUNNEL: ${{ secrets.CF_QUICK_TUNNEL }}
          # (대안2) 터널 없이 EC2 Public IP로 Metabase 직접 공개. "true"면 analytics 프로파일을 0.0.0.0:3000으로 노출.
          #   ⚠️ http 평문 — 반드시 EC2 보안그룹 인바운드 3000을 신뢰 IP로 제한할 것.
          ENABLE_METABASE: ${{ secrets.ENABLE_METABASE }}
          # 관리자 콘솔 로그인 자격(이메일 화이트리스트 + 공용 비번). 레포가 PUBLIC이라 값은 시크릿에서만.
          #   미설정이면 admin 로그인 불가(안전). ADMIN_EMAILS=a@x.com,b@y.com / ADMIN_PASSWORD=<공용비번>
          ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 20m
          # GitHub Actions secrets를 원격 SSH 세션 환경변수로 전달
          envs: KAKAO_CLIENT_SECRET,NAVER_CLIENT_ID,NAVER_CLIENT_SECRET,JWT_SECRET,GEMINI_API_KEY,GOOGLE_MAPS_API_KEY,ANTHROPIC_API_KEY,GC_PROM_URL,GC_PROM_USER,GC_API_KEY,GC_LOKI_URL,GC_LOKI_USER,CF_TUNNEL_TOKEN,MB_SITE_URL,CF_QUICK_TUNNEL,ENABLE_METABASE,ADMIN_EMAILS,ADMIN_PASSWORD
          script: |
            set -e
            cd ~/modi-backend
            git fetch origin main
            git checkout -B main origin/main
            git reset --hard origin/main
            # 운영은 prod 프로파일로 기동 (CORS: https://yeowun.vercel.app 만 허용)
            # OAuth/JWT 시크릿은 .env로 주입(compose.yaml app env가 참조).
            # client-id·redirect-uri·CORS는 application.yaml prod 기본값(공개 정보).
            cat > .env <<EOF
            SPRING_PROFILES_ACTIVE=prod
            # 운영은 컨테이너를 호스트 8080으로 노출(공개 주소·아래 헬스체크 localhost:8080과 일치).
            # compose.yaml은 기본 18090이라 이 값이 없으면 8080이 비어 배포 헬스체크가 실패한다.
            APP_HOST_PORT=8080
            KAKAO_CLIENT_SECRET=${KAKAO_CLIENT_SECRET}
            NAVER_CLIENT_ID=${NAVER_CLIENT_ID}
            NAVER_CLIENT_SECRET=${NAVER_CLIENT_SECRET}
            JWT_SECRET=${JWT_SECRET}
            GEMINI_API_KEY=${GEMINI_API_KEY}
            # 전시 영업시간 = 운영만 구글 Places 실호출. GOOGLE_MAPS_API_KEY 없으면 앱이 mock로 폴백(과금 0).
            PLACE_HOURS_PROVIDER=google
            GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
            # record-AI 감상문/질문 = Claude(Anthropic, 유료). 무료 한도 소진으로 gemini→claude 전환.
            #   장르 분류(app.ai.gemini)는 계속 무료 Gemini(GEMINI_API_KEY)를 쓴다 — 여기서 GEMINI_API_KEY는 그 용도로 유지.
            #   AI_API_KEY(공통 우선키)에 ANTHROPIC_API_KEY를 매핑한다. 빈 값이면 앱이 AI_DISABLED가 되니 반드시 채운다.
            AI_PROVIDER=claude
            # 베타 비용/품질 균형 — Opus(기본) 대신 Sonnet. 필요 시 이 한 줄만 바꿔 즉시 모델 교체(재배포).
            AI_MODEL=claude-sonnet-5
            ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
            AI_API_KEY=${ANTHROPIC_API_KEY}
            # 관리자 콘솔 로그인(이메일 화이트리스트 + 공용 비번). 시크릿에서만 주입(레포 PUBLIC).
            ADMIN_EMAILS=${ADMIN_EMAILS}
            ADMIN_PASSWORD=${ADMIN_PASSWORD}
            # Grafana Cloud(관측) 자격증명 — 비어 있으면 아래에서 obs 프로파일을 켜지 않는다.
            GC_PROM_URL=${GC_PROM_URL}
            GC_PROM_USER=${GC_PROM_USER}
            GC_API_KEY=${GC_API_KEY}
            GC_LOKI_URL=${GC_LOKI_URL}
            GC_LOKI_USER=${GC_LOKI_USER}
            # 운영 인스턴스 라벨(로컬과 시계열 분리) — 시크릿 아님.
            GC_INSTANCE=modi-backend-prod
            # Metabase 외부 공개(Cloudflare Tunnel). CF_TUNNEL_TOKEN 있으면 아래에서 analytics+tunnel 프로파일 기동.
            CF_TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
            MB_SITE_URL=${MB_SITE_URL}
            EOF

            # 관측 자격증명(GC_API_KEY)이 있으면 obs 프로파일(Alloy 에이전트)도 함께 기동해 메트릭을 Grafana Cloud로 전송.
            # 없으면 --profile app만 → 기존 배포와 100% 동일(관측 secrets 등록 전에도 안전).
            PROFILES="--profile app"
            if [ -n "${GC_API_KEY}" ]; then
              PROFILES="$PROFILES --profile obs"
              echo "🔭 관측(obs) 프로파일 활성화 — Alloy가 Grafana Cloud로 메트릭 전송"
            else
              echo "ℹ️  GC_API_KEY 미설정 → 관측 프로파일 생략(앱만 배포)"
            fi
            QUICK_TUNNEL=0
            if [ -n "${CF_TUNNEL_TOKEN}" ]; then
              PROFILES="$PROFILES --profile analytics --profile tunnel"
              echo "📊 Metabase + Cloudflare Tunnel(named, 고정 주소) 활성화"
            elif [ "${CF_QUICK_TUNNEL}" = "true" ]; then
              PROFILES="$PROFILES --profile analytics --profile tunnel-quick"
              QUICK_TUNNEL=1
              echo "📊 Metabase + Cloudflare quick tunnel 활성화 (URL은 아래 로그에서 확인, 재시작 시 변경)"
            elif [ "${ENABLE_METABASE}" = "true" ]; then
              # 터널 없이 EC2 Public IP로 Metabase 직접 노출: 호스트 0.0.0.0:3000 바인딩 + 사이트 URL을 공개 IP로.
              #   ⚠️ http 평문 — 반드시 EC2 보안그룹 인바운드 3000을 신뢰 IP로 제한할 것.
              PROFILES="$PROFILES --profile analytics"
              echo "MB_HOST_PORT=3000" >> .env
              sed -i 's|^MB_SITE_URL=.*|MB_SITE_URL=http://3.35.111.143:3000|' .env
              echo "📊 Metabase public 노출 활성화 → http://3.35.111.143:3000 (EC2 보안그룹 인바운드 3000 개방 필요)"
            fi
            # ⚠️ 수동 dispatch에서 reset_db=true일 때만 mysql 볼륨 삭제(DB 초기화).
            #    Flyway 최초 도입/스키마 리셋 전용. push 배포에선 inputs가 비어 항상 스킵된다.
            if [ "${{ inputs.reset_db }}" = "true" ]; then
              echo "⚠️ reset_db=true → mysql-data 볼륨 삭제(DB 완전 초기화)"
              sudo docker compose $PROFILES down -v
            fi

            # 디스크 정리 — 배포마다 쌓이는 빌드 레이어/구 이미지로 'No space left on device' 재발 방지(run 29329247179).
            # 실행 중 컨테이너의 이미지·사용 중 볼륨(DB)은 prune 대상이 아니다.
            sudo docker image prune -af || true
            sudo docker builder prune -af || true
            echo "디스크 상태: $(df -h / | tail -1)"

            sudo docker compose $PROFILES up -d --build

            # 배포 후 헬스체크 검증: UP 될 때까지 최대 150초 폴링, 실패 시 로그 출력하고 배포 실패 처리
            # 운영 호스트 노출 포트 = 8080(.env의 APP_HOST_PORT=8080 → compose가 8080:8080으로 매핑).
            # 공개 주소(3.35.111.143:8080)와 동일 포트라 헬스체크도 8080. (로컬 도커는 18090이지만 배포는 prod 기준)
            # 1GB 박스는 부팅(컨텍스트 초기화)이 느려 150초를 넘길 수 있다 → 300초(60회×5초)까지 대기해 오탐 실패 방지.
            echo "Waiting for app to become healthy..."
            for i in $(seq 1 60); do
              if curl -fsS http://localhost:8080/actuator/health | grep -q '"status":"UP"'; then
                echo "✅ Health check passed"
                sudo docker compose $PROFILES ps
                if [ "$QUICK_TUNNEL" = "1" ]; then
                  echo "⏳ quick tunnel URL 대기..."; sleep 12
                  URL=$(sudo docker logs modi-cloudflared-quick 2>&1 | grep -oE 'https://[a-z0-9-]+\.trycloudflare\.com' | tail -1)
                  echo "🌐 Metabase 공개 URL(임시): ${URL:-'(로그에서 확인: docker logs modi-cloudflared-quick)'}"
                fi
                exit 0
              fi
              echo "  ...not ready yet ($i/60)"
              sleep 5
            done
            echo "❌ Health check FAILED after timeout"
            sudo docker compose $PROFILES ps
            sudo docker compose --profile app logs --tail=80 app
            exit 1
