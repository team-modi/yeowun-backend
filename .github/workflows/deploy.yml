name: Deploy to EC2

# main에 push/merge되면 테스트를 먼저 돌리고(test), 통과한 경우에만 EC2에 배포한다.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-ec2
  cancel-in-progress: false

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Run tests
        run: |
          chmod +x gradlew
          ./gradlew test --no-daemon

  deploy:
    needs: test          # 테스트가 통과해야만 배포
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 20m
          # GitHub Actions secrets를 원격 SSH 세션 환경변수로 전달
          envs: KAKAO_CLIENT_SECRET,GOOGLE_CLIENT_SECRET,JWT_SECRET,GEMINI_API_KEY
          script: |
            set -e
            cd ~/modi-backend
            git fetch origin main
            git checkout -B main origin/main
            git reset --hard origin/main
            # 운영은 prod 프로파일로 기동 (CORS: https://yeowun.vercel.app 만 허용)
            # OAuth/JWT 시크릿은 .env로 주입(compose.yaml app env가 참조).
            # client-id·redirect-uri·CORS는 application.yaml prod 기본값(공개 정보).
            cat > .env <<EOF
            SPRING_PROFILES_ACTIVE=prod
            # 운영은 컨테이너를 호스트 8080으로 노출(공개 주소·아래 헬스체크 localhost:8080과 일치).
            # compose.yaml은 기본 18090이라 이 값이 없으면 8080이 비어 배포 헬스체크가 실패한다.
            APP_HOST_PORT=8080
            KAKAO_CLIENT_SECRET=${KAKAO_CLIENT_SECRET}
            GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
            JWT_SECRET=${JWT_SECRET}
            GEMINI_API_KEY=${GEMINI_API_KEY}
            # record-AI 감상문을 Gemini로 활성화 (위 GEMINI_API_KEY 시크릿 재사용).
            AI_PROVIDER=gemini
            AI_API_KEY=${GEMINI_API_KEY}
            EOF
            sudo docker compose --profile app up -d --build

            # 배포 후 헬스체크 검증: UP 될 때까지 최대 150초 폴링, 실패 시 로그 출력하고 배포 실패 처리
            # 운영 호스트 노출 포트 = 8080(.env의 APP_HOST_PORT=8080 → compose가 8080:8080으로 매핑).
            # 공개 주소(3.35.111.143:8080)와 동일 포트라 헬스체크도 8080. (로컬 도커는 18090이지만 배포는 prod 기준)
            echo "Waiting for app to become healthy..."
            for i in $(seq 1 30); do
              if curl -fsS http://localhost:8080/actuator/health | grep -q '"status":"UP"'; then
                echo "✅ Health check passed"
                sudo docker compose --profile app ps
                exit 0
              fi
              echo "  ...not ready yet ($i/30)"
              sleep 5
            done
            echo "❌ Health check FAILED after timeout"
            sudo docker compose --profile app ps
            sudo docker compose --profile app logs --tail=80 app
            exit 1
