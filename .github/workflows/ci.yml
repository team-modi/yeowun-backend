name: CI

# main·develop로 가는 PR(및 push)마다 테스트를 돌린다.
# 브랜치 보호 규칙에서 이 "test" 체크를 required로 걸어 머지 게이트로 사용.
on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Run tests
        run: |
          chmod +x gradlew
          ./gradlew test --no-daemon
