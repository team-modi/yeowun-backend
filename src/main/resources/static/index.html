<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>여운 - 소셜 로그인 테스트</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 480px; margin: 64px auto; padding: 0 16px; text-align: center; }
    h1 { font-size: 22px; }
    p.desc { color: #71717a; font-size: 14px; }
    a.btn { display: block; text-decoration: none; color: #18181b; font-weight: 600;
            border: 1px solid #e4e4e7; border-radius: 10px; padding: 14px; margin: 12px 0; }
    a.kakao { background: #FEE500; border-color: #FEE500; }
    a.google { background: #fff; }
    small { color: #a1a1aa; }
  </style>
</head>
<body>
  <h1>여운 소셜 로그인 테스트</h1>
  <p class="desc">버튼을 누르면 카카오/구글 로그인 → 콜백에서 자체 JWT가 발급됩니다.</p>

  <a class="btn kakao" href="/oauth/kakao/login">카카오로 로그인</a>
  <a class="btn google" href="/oauth/google/login">구글로 로그인</a>

  <p><small>redirect_uri = http://localhost:8080/login (콘솔 등록값과 일치해야 함)</small></p>
</body>
</html>
