<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>모디 · 전시 탐색 (데모)</title>
  <style>
    :root { --bg:#0f1115; --card:#171a21; --line:#262b36; --fg:#e7e9ee; --muted:#9aa3b2; --accent:#7c9cff; --catalog:#2b7a4b; --custom:#8a5a2b; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--fg); }
    header { padding:24px 20px 8px; }
    header h1 { margin:0; font-size:22px; }
    header p { margin:6px 0 0; color:var(--muted); font-size:13px; }
    .filters { display:flex; flex-wrap:wrap; gap:8px; padding:16px 20px; position:sticky; top:0; background:rgba(15,17,21,.92); backdrop-filter:blur(6px); border-bottom:1px solid var(--line); z-index:5; }
    .filters input, .filters select { background:var(--card); color:var(--fg); border:1px solid var(--line); border-radius:8px; padding:8px 10px; font-size:14px; }
    .filters button { background:var(--accent); color:#0b0d12; border:0; border-radius:8px; padding:8px 14px; font-weight:600; cursor:pointer; }
    .filters button.ghost { background:transparent; color:var(--muted); border:1px solid var(--line); font-weight:500; }
    .status { padding:8px 20px; color:var(--muted); font-size:13px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:16px; padding:16px 20px 40px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:12px; overflow:hidden; cursor:pointer; transition:transform .08s ease, border-color .08s ease; }
    .card:hover { transform:translateY(-2px); border-color:var(--accent); }
    .poster { aspect-ratio:3/4; background:linear-gradient(135deg,#20242e,#2c3242); display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:12px; }
    .poster img { width:100%; height:100%; object-fit:cover; }
    .card .body { padding:12px; }
    .badge { display:inline-block; font-size:11px; padding:2px 7px; border-radius:999px; color:#fff; }
    .badge.CATALOG { background:var(--catalog); }
    .badge.CUSTOM { background:var(--custom); }
    .card h3 { margin:8px 0 4px; font-size:15px; line-height:1.3; }
    .card .meta { color:var(--muted); font-size:12px; margin:2px 0; }
    .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.6); display:none; align-items:center; justify-content:center; padding:20px; z-index:20; }
    .modal { background:var(--card); border:1px solid var(--line); border-radius:14px; max-width:520px; width:100%; padding:22px; }
    .modal h2 { margin:0 0 4px; font-size:19px; }
    .modal .row { color:var(--muted); font-size:13px; margin:4px 0; }
    .modal .desc { margin-top:12px; font-size:14px; line-height:1.5; }
    .modal button { margin-top:18px; background:transparent; border:1px solid var(--line); color:var(--fg); border-radius:8px; padding:8px 14px; cursor:pointer; }
    details.reg { margin:0 20px 24px; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px 16px; }
    details.reg summary { cursor:pointer; font-weight:600; }
    details.reg .form { display:grid; gap:8px; margin-top:12px; grid-template-columns:1fr 1fr; }
    details.reg input { grid-column:span 2; background:var(--bg); color:var(--fg); border:1px solid var(--line); border-radius:8px; padding:8px 10px; }
    details.reg input.half { grid-column:span 1; }
    details.reg button { grid-column:span 2; background:var(--accent); color:#0b0d12; border:0; border-radius:8px; padding:9px; font-weight:600; cursor:pointer; }
    details.reg .hint { grid-column:span 2; color:var(--muted); font-size:12px; }
    .tag-mock { color:#e0b15a; }
  </style>
</head>
<body>
  <header>
    <h1>모디 · 전시 탐색 <span style="color:var(--muted);font-size:14px;">(데모)</span></h1>
    <p>공공데이터(한눈에보는문화정보, data.go.kr 15138937) 동기화 데이터 + 표본/MOCK 전시. 실제 <code>/api/v1/exhibitions</code> 를 호출합니다.</p>
  </header>

  <div class="filters">
    <input id="keyword" placeholder="전시명·전시장 검색" />
    <input id="date" type="date" title="해당 날짜 진행 중" />
    <select id="region">
      <option value="">지역 전체</option>
      <option value="SEOUL">서울</option><option value="GYEONGGI">경기</option>
      <option value="BUSAN">부산</option><option value="DAEGU">대구</option><option value="ETC">기타</option>
    </select>
    <select id="category">
      <option value="">카테고리 전체</option>
      <option value="PAINTING">회화</option><option value="PHOTO">사진</option>
      <option value="MEDIA">미디어</option><option value="SCULPTURE">조각</option><option value="ETC">기타</option>
    </select>
    <button onclick="loadList()">검색</button>
    <button class="ghost" onclick="resetFilters()">초기화</button>
  </div>

  <div class="status" id="status">불러오는 중…</div>
  <div class="grid" id="grid"></div>

  <details class="reg">
    <summary>개인 전시 등록 (로그인 필요 · access 토큰 붙여넣기)</summary>
    <div class="form">
      <input id="reg-token" placeholder="Bearer access 토큰 (로그인 후 발급)" />
      <input id="reg-title" placeholder="전시명 (필수)" />
      <input id="reg-place" class="half" placeholder="장소" />
      <input id="reg-poster" class="half" placeholder="포스터 URL" />
      <input id="reg-start" class="half" type="date" title="시작일" />
      <input id="reg-end" class="half" type="date" title="종료일" />
      <button onclick="registerCustom()">등록</button>
      <div class="hint">등록 성공 시 목록을 새로고침합니다. 토큰이 있어야 내 CUSTOM 전시가 목록/상세에 보입니다.</div>
    </div>
  </details>

  <div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
    <div class="modal" id="modal"></div>
  </div>

  <script>
    const REGION_KO = { SEOUL:'서울', GYEONGGI:'경기', BUSAN:'부산', DAEGU:'대구', ETC:'기타' };
    const CATEGORY_KO = { PAINTING:'회화', PHOTO:'사진', MEDIA:'미디어', SCULPTURE:'조각', ETC:'기타' };
    // API가 비어있거나 서버가 꺼져 있어도 화면이 비지 않도록 하는 클라이언트 MOCK 폴백.
    const MOCK_FALLBACK = [
      { exhibitionId:-1, type:'CATALOG', title:'[폴백] 모네: 빛의 정원', place:'예술의전당', startDate:'2026-06-01', endDate:'2026-09-30', region:'SEOUL', category:'PAINTING', posterUrl:null },
      { exhibitionId:-2, type:'CATALOG', title:'[폴백] 서울 도시 사진 아카이브전', place:'서울시립미술관', startDate:'2026-06-10', endDate:'2026-07-20', region:'SEOUL', category:'PHOTO', posterUrl:null },
      { exhibitionId:-3, type:'CATALOG', title:'[MOCK] 골목길 드로잉전', place:'성수동 갤러리', startDate:'2026-06-20', endDate:'2026-07-05', region:'SEOUL', category:'PAINTING', posterUrl:null },
    ];

    function tokenHeader() {
      const t = document.getElementById('reg-token').value.trim();
      if (!t) return {};
      return { 'Authorization': t.startsWith('Bearer ') ? t : 'Bearer ' + t };
    }

    function qs() {
      const p = new URLSearchParams();
      const kw = document.getElementById('keyword').value.trim();
      const d = document.getElementById('date').value;
      const r = document.getElementById('region').value;
      const c = document.getElementById('category').value;
      if (kw) p.set('keyword', kw);
      if (d) p.set('date', d);
      if (r) p.set('region', r);
      if (c) p.set('category', c);
      p.set('size', '40');
      return p.toString();
    }

    async function loadList() {
      const status = document.getElementById('status');
      status.textContent = '불러오는 중…';
      try {
        const res = await fetch('/api/v1/exhibitions?' + qs(), { headers: tokenHeader() });
        const json = await res.json();
        if (json.meta?.result !== 'SUCCESS') throw new Error(json.meta?.errorCode || 'FAIL');
        const items = json.data?.content ?? [];
        if (items.length === 0) {
          status.textContent = '조건에 맞는 전시가 없습니다. (서버 응답 정상 · 결과 0건)';
          render([]);
        } else {
          status.textContent = `총 ${json.data.totalElements}건 · ${items.length}건 표시`;
          render(items);
        }
      } catch (e) {
        status.innerHTML = `서버 응답을 받지 못해 <span class="tag-mock">MOCK 폴백</span>을 표시합니다. (${e.message})`;
        render(MOCK_FALLBACK);
      }
    }

    function render(items) {
      const grid = document.getElementById('grid');
      grid.innerHTML = items.map(cardHtml).join('');
    }

    function cardHtml(x) {
      const poster = x.posterUrl
        ? `<img src="${x.posterUrl}" onerror="this.style.display='none';this.parentElement.textContent='이미지 없음'"/>`
        : '이미지 없음';
      const period = [x.startDate, x.endDate].filter(Boolean).join(' ~ ') || '기간 미정';
      const region = REGION_KO[x.region] || x.region || '';
      const category = CATEGORY_KO[x.category] || x.category || '';
      const clickable = x.exhibitionId > 0 ? `onclick="openDetail(${x.exhibitionId})"` : '';
      return `<div class="card" ${clickable}>
        <div class="poster">${poster}</div>
        <div class="body">
          <span class="badge ${x.type}">${x.type}</span>
          <h3>${escapeHtml(x.title)}</h3>
          <div class="meta">${escapeHtml(x.place || '장소 미정')}</div>
          <div class="meta">${period}</div>
          <div class="meta">${[region, category].filter(Boolean).join(' · ')}</div>
        </div></div>`;
    }

    async function openDetail(id) {
      try {
        const res = await fetch('/api/v1/exhibitions/' + id, { headers: tokenHeader() });
        const json = await res.json();
        if (json.meta?.result !== 'SUCCESS') { alert('상세 조회 실패: ' + (json.meta?.errorCode)); return; }
        const d = json.data;
        const period = [d.startDate, d.endDate].filter(Boolean).join(' ~ ') || '기간 미정';
        document.getElementById('modal').innerHTML = `
          <span class="badge ${d.type}">${d.type}</span>
          <h2>${escapeHtml(d.title)}</h2>
          <div class="row">📍 ${escapeHtml(d.place || '장소 미정')}</div>
          <div class="row">📅 ${period}</div>
          <div class="row">🗂 ${[REGION_KO[d.region]||d.region, CATEGORY_KO[d.category]||d.category].filter(Boolean).join(' · ')}</div>
          ${d.operatingHours ? `<div class="row">🕒 ${escapeHtml(d.operatingHours)}</div>`:''}
          ${d.price ? `<div class="row">💳 ${escapeHtml(d.price)}</div>`:''}
          ${d.serviceName ? `<div class="row">🏛 제공: ${escapeHtml(d.serviceName)}</div>`:''}
          ${(d.gpsX!=null && d.gpsY!=null) ? `<div class="row">🧭 좌표: ${d.gpsY}, ${d.gpsX}</div>`:''}
          ${d.detailUrl ? `<div class="row">🔗 <a href="${d.detailUrl}" target="_blank" rel="noopener" style="color:var(--accent)">원문 상세 페이지</a></div>`:''}
          ${d.description ? `<div class="desc">${escapeHtml(d.description)}</div>`:'<div class="desc" style="color:var(--muted)">상세 설명 데이터 없음</div>'}
          <button onclick="closeModal()">닫기</button>`;
        document.getElementById('modal-bg').style.display = 'flex';
      } catch (e) { alert('상세 조회 오류: ' + e.message); }
    }
    function closeModal(){ document.getElementById('modal-bg').style.display = 'none'; }

    async function registerCustom() {
      const body = {
        title: document.getElementById('reg-title').value.trim(),
        place: document.getElementById('reg-place').value.trim() || null,
        posterUrl: document.getElementById('reg-poster').value.trim() || null,
        startDate: document.getElementById('reg-start').value || null,
        endDate: document.getElementById('reg-end').value || null,
      };
      if (!body.title) { alert('전시명은 필수입니다.'); return; }
      const headers = Object.assign({ 'Content-Type':'application/json' }, tokenHeader());
      if (!headers.Authorization) { alert('access 토큰을 입력하세요.'); return; }
      const res = await fetch('/api/v1/exhibitions/custom', { method:'POST', headers, body: JSON.stringify(body) });
      const json = await res.json();
      if (json.meta?.result === 'SUCCESS') { alert('등록 완료! id=' + json.data.exhibitionId); loadList(); }
      else alert('등록 실패: ' + (json.meta?.errorCode) + ' — ' + (json.meta?.message||''));
    }

    function resetFilters(){ ['keyword','date','region','category'].forEach(id=>document.getElementById(id).value=''); loadList(); }
    function escapeHtml(s){ return String(s??'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

    loadList();
  </script>
</body>
</html>
