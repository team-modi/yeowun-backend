<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>모디 · 전시 목록</title>
<style>
  :root {
    --page-bg: #eef0f3;
    --surface: #ffffff;
    --border: #e6e8ec;
    --text: #1b1e27;
    --muted: #8b93a1;
    --accent: #2f6bff;
    --accent-soft: #eaf0ff;
    --chip-bg: #f4f5f7;
    --disabled: #c7cbd3;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--page-bg); }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Segoe UI", Roboto, sans-serif;
    color: var(--text);
    display: flex;
    justify-content: center;
  }
  .app {
    width: 100%;
    max-width: 430px;
    min-height: 100vh;
    background: var(--page-bg);
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* Top bar */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 18px 8px;
  }
  .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
  .icon-btn {
    width: 36px; height: 36px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 16px;
    color: var(--text);
  }

  /* Search */
  .search-wrap { padding: 10px 18px 4px; }
  .search-wrap input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface);
    font-size: 14px;
    color: var(--text);
  }
  .search-wrap input::placeholder { color: var(--muted); }

  /* Controls row */
  .controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 18px 6px;
  }
  select#sort {
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    border-radius: 10px;
    padding: 8px 10px;
    font-size: 13px;
  }
  .filter-btn {
    display: flex;
    align-items: center;
    gap: 4px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    border-radius: 10px;
    padding: 8px 12px;
    font-size: 13px;
    cursor: pointer;
  }
  .filter-btn .dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
    display: none;
  }
  .filter-btn.active .dot { display: inline-block; }

  /* Status */
  .status { padding: 4px 18px 8px; color: var(--muted); font-size: 12px; }

  /* Card list */
  .list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 6px 18px 96px;
  }
  .card {
    display: flex;
    gap: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px;
    cursor: pointer;
  }
  .card:active { background: var(--accent-soft); }
  .thumb {
    width: 76px;
    height: 96px;
    flex: 0 0 auto;
    border-radius: 10px;
    background: var(--chip-bg);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 11px;
  }
  .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .card-body { flex: 1; min-width: 0; padding: 2px 0; }
  .card-title {
    font-size: 15px;
    font-weight: 700;
    margin: 0 0 4px;
    line-height: 1.35;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  .card-artist { font-size: 12.5px; color: var(--text); margin: 0 0 4px; }
  .card-meta { font-size: 12px; color: var(--muted); margin: 2px 0; }

  .empty-state { text-align: center; color: var(--muted); font-size: 13px; padding: 60px 20px; }

  /* Bottom tab bar */
  .tabbar {
    position: sticky;
    bottom: 0;
    width: 100%;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 10;
    padding-bottom: env(safe-area-inset-bottom, 0);
  }
  .tab {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 10px 0 8px;
    color: var(--muted);
    font-size: 11px;
    cursor: default;
  }
  .tab .tab-icon { font-size: 18px; }
  .tab.active { color: var(--accent); font-weight: 600; }

  /* Filter bottom sheet */
  .sheet-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(15, 17, 23, 0.45);
    display: none;
    z-index: 50;
  }
  .sheet-backdrop.open { display: block; }
  .sheet {
    position: fixed;
    left: 50%;
    bottom: 0;
    transform: translateX(-50%);
    width: 100%;
    max-width: 430px;
    max-height: 82vh;
    background: var(--surface);
    border-radius: 18px 18px 0 0;
    padding: 18px 18px calc(16px + env(safe-area-inset-bottom, 0));
    overflow-y: auto;
    z-index: 51;
  }
  .sheet-handle {
    width: 40px; height: 4px; border-radius: 2px; background: var(--border);
    margin: 0 auto 14px;
  }
  .sheet-title { font-size: 16px; font-weight: 700; margin: 0 0 4px; }
  .sheet-section { margin-top: 18px; }
  .sheet-section h4 { font-size: 13px; color: var(--muted); margin: 0 0 10px; font-weight: 600; }
  .chip-group { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--chip-bg);
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
  }
  .chip.selected {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }
  .chip.disabled {
    color: var(--disabled);
    cursor: not-allowed;
    background: #f7f7f8;
  }
  .sheet-footer {
    display: flex;
    gap: 10px;
    margin-top: 22px;
  }
  .btn-reset {
    flex: 0 0 auto;
    padding: 13px 18px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 14px;
    cursor: pointer;
  }
  .btn-apply {
    flex: 1;
    padding: 13px 18px;
    border-radius: 12px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
  }
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="logo">Logo</div>
    <button class="icon-btn" title="북마크" aria-label="북마크">&#9825;</button>
  </div>

  <div class="search-wrap">
    <input id="keyword" type="text" placeholder="전시를 검색해보세요" />
  </div>

  <div class="controls">
    <select id="sort">
      <option value="latest">최신순</option>
      <option value="ending">종료순</option>
      <option value="popular">인기순</option>
    </select>
    <button class="filter-btn" id="filter-open-btn">
      <span class="dot" id="filter-dot"></span>
      필터
    </button>
  </div>

  <div class="status" id="status">불러오는 중…</div>
  <div class="list" id="list"></div>

  <div class="tabbar">
    <div class="tab active"><span class="tab-icon">&#8962;</span>홈</div>
    <div class="tab"><span class="tab-icon">&#128197;</span>전시정보</div>
    <div class="tab"><span class="tab-icon">&#128218;</span>아카이브</div>
    <div class="tab"><span class="tab-icon">&#128100;</span>프로필</div>
  </div>

  <div class="sheet-backdrop" id="sheet-backdrop"></div>
  <div class="sheet" id="sheet" style="display:none;">
    <div class="sheet-handle"></div>
    <div class="sheet-title">필터</div>

    <div class="sheet-section">
      <h4>지역</h4>
      <div class="chip-group" id="region-chips"></div>
    </div>

    <div class="sheet-section">
      <h4>장르</h4>
      <div class="chip-group" id="genre-chips"></div>
    </div>

    <div class="sheet-footer">
      <button class="btn-reset" id="filter-reset-btn">초기화</button>
      <button class="btn-apply" id="filter-apply-btn">전시 보기</button>
    </div>
  </div>

</div>

<script>
  const REGIONS = [
    { code: '', label: '전체' },
    { code: 'SEOUL', label: '서울' },
    { code: 'GYEONGGI', label: '경기' },
    { code: 'INCHEON', label: '인천' },
    { code: 'DAEGU', label: '대구' },
    { code: 'GYEONGBUK', label: '경북' },
    { code: 'BUSAN', label: '부산' },
    { code: 'ULSAN', label: '울산' },
    { code: 'GYEONGNAM', label: '경남' },
    { code: 'SEJONG', label: '세종' },
    { code: 'JEONNAM', label: '전남' },
    { code: 'JEONBUK', label: '전북' },
    { code: 'JEJU', label: '제주' },
    { code: 'CHUNGNAM', label: '충남' },
    { code: 'CHUNGBUK', label: '충북' },
  ];

  const GENRES = ['드로잉', '건축', '회화', '사진', '조각', '설치', '미디어아트', '디자인', '공예', '만화', '퍼포먼스', '영화'];

  const REGION_KO = Object.fromEntries(REGIONS.filter(r => r.code).map(r => [r.code, r.label]));

  // state actually applied to the list query
  let appliedRegion = '';
  // sheet-local selection (not yet applied until "전시 보기")
  let sheetRegion = '';

  let searchDebounce = null;
  let countDebounce = null;

  function qs(overrides) {
    const p = new URLSearchParams();
    const keyword = document.getElementById('keyword').value.trim();
    if (keyword) p.set('keyword', keyword);
    p.set('sort', document.getElementById('sort').value);
    const region = overrides && 'region' in overrides ? overrides.region : appliedRegion;
    if (region) p.set('region', region);
    p.set('page', '0');
    p.set('size', overrides && overrides.size ? String(overrides.size) : '20');
    return p.toString();
  }

  async function loadList() {
    const status = document.getElementById('status');
    const list = document.getElementById('list');
    status.textContent = '불러오는 중…';
    try {
      const res = await fetch('/api/v1/exhibitions?' + qs());
      const json = await res.json();
      if (json.meta?.result !== 'SUCCESS') throw new Error(json.meta?.errorCode || 'FAIL');
      const items = json.data?.content ?? [];
      if (items.length === 0) {
        status.textContent = '조건에 맞는 전시가 없습니다.';
        list.innerHTML = '<div class="empty-state">표시할 전시가 없습니다.</div>';
      } else {
        status.textContent = `총 ${json.data.totalElements}건`;
        list.innerHTML = items.map(cardHtml).join('');
      }
    } catch (e) {
      status.textContent = '전시 목록을 불러오지 못했습니다. (' + e.message + ')';
      list.innerHTML = '<div class="empty-state">잠시 후 다시 시도해주세요.</div>';
    }
  }

  function formatDate(d) {
    if (!d) return '';
    return String(d).replaceAll('-', '.');
  }

  function periodText(x) {
    const s = formatDate(x.startDate);
    const e = formatDate(x.endDate);
    if (s && e) return `${s} ~ ${e}`;
    return s || e || '';
  }

  function placeRegionText(x) {
    const region = REGION_KO[x.region] || '';
    return [x.place, region].filter(Boolean).join(' / ');
  }

  function cardHtml(x) {
    const thumb = x.posterUrl
      ? `<img src="${x.posterUrl}" alt="" onerror="this.remove()" />`
      : '';
    // 작가 필드는 목록 API에 없으므로 생략
    return `<div class="card" onclick="location.href='exhibition-detail.html?id=${x.exhibitionId}'">
      <div class="thumb">${thumb}</div>
      <div class="card-body">
        <p class="card-title">${escapeHtml(x.title)}</p>
        <p class="card-meta">${escapeHtml(placeRegionText(x))}</p>
        <p class="card-meta">${escapeHtml(periodText(x))}</p>
      </div>
    </div>`;
  }

  function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
  }

  /* ---- Filter bottom sheet ---- */

  function renderRegionChips() {
    const wrap = document.getElementById('region-chips');
    wrap.innerHTML = REGIONS.map(r =>
      `<button type="button" class="chip ${sheetRegion === r.code ? 'selected' : ''}" data-region="${r.code}">${r.label}</button>`
    ).join('');
    wrap.querySelectorAll('.chip').forEach(el => {
      el.addEventListener('click', () => {
        sheetRegion = el.dataset.region;
        renderRegionChips();
        scheduleCountPreview();
      });
    });
  }

  function renderGenreChips() {
    const wrap = document.getElementById('genre-chips');
    wrap.innerHTML = GENRES.map(g => `<button type="button" class="chip disabled" disabled>${g}</button>`).join('');
  }

  function openSheet() {
    sheetRegion = appliedRegion;
    renderRegionChips();
    renderGenreChips();
    document.getElementById('sheet').style.display = 'block';
    document.getElementById('sheet-backdrop').classList.add('open');
    scheduleCountPreview();
  }

  function closeSheet() {
    document.getElementById('sheet').style.display = 'none';
    document.getElementById('sheet-backdrop').classList.remove('open');
  }

  function scheduleCountPreview() {
    clearTimeout(countDebounce);
    countDebounce = setTimeout(updateCountPreview, 150);
  }

  async function updateCountPreview() {
    const applyBtn = document.getElementById('filter-apply-btn');
    applyBtn.textContent = '전시 보기';
    try {
      const res = await fetch('/api/v1/exhibitions?' + qs({ region: sheetRegion, size: 1 }));
      const json = await res.json();
      if (json.meta?.result === 'SUCCESS') {
        const n = json.data?.totalElements ?? 0;
        applyBtn.textContent = `${n}개 전시 보기`;
      }
    } catch (e) {
      // count preview is best-effort; keep default label on failure
    }
  }

  document.getElementById('filter-open-btn').addEventListener('click', openSheet);
  document.getElementById('sheet-backdrop').addEventListener('click', closeSheet);
  document.getElementById('filter-reset-btn').addEventListener('click', () => {
    sheetRegion = '';
    renderRegionChips();
    scheduleCountPreview();
  });
  document.getElementById('filter-apply-btn').addEventListener('click', () => {
    appliedRegion = sheetRegion;
    const dot = document.getElementById('filter-dot');
    const btn = document.getElementById('filter-open-btn');
    if (appliedRegion) btn.classList.add('active'); else btn.classList.remove('active');
    closeSheet();
    loadList();
  });

  document.getElementById('sort').addEventListener('change', loadList);
  document.getElementById('keyword').addEventListener('input', () => {
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(loadList, 350);
  });

  loadList();
</script>
</body>
</html>
