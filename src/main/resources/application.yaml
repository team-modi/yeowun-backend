spring:
  application:
    name: backend
  # webflux 의존(WebClient) 추가했지만 웹 스택은 서블릿(MVC) 유지.
  main:
    web-application-type: servlet
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/mydatabase}
    username: ${SPRING_DATASOURCE_USERNAME:myuser}
    password: ${SPRING_DATASOURCE_PASSWORD:secret}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: 8080

# CORS 허용 오리진 (공개 정보 — 시크릿 아님).
# 기본(프로파일 없음) = 로컬 개발용. 운영 배포는 prod 프로파일에서 Vercel 도메인으로 override.
app:
  cors:
    allowed-origin-patterns:
      - http://localhost:3000   # 여운 프론트 로컬
      - http://localhost:3005   # 여운 프론트 로컬(대체 포트)
      - http://localhost:8080   # 백엔드 내장 HTML 테스트 페이지

  # OAuth 설정. client-id는 공개성 값이라 기본값을 둔다. client-secret은 시크릿 → 환경변수로만 주입.
  # redirect-uri는 콘솔에 등록된 값과 정확히 일치해야 한다(현재 테스트는 백엔드 내장 페이지 = :8080/login).
  oauth:
    redirect-uri: ${OAUTH_REDIRECT_URI:http://localhost:8080/login}
    # FE 주도 로그인에서 허용하는 redirectUri 화이트리스트 (로컬 프론트/테스트)
    allowed-redirect-uris:
      - http://localhost:3000/login
      - http://localhost:3005/login
      - http://localhost:8080/login
    kakao:
      # 테스트앱 "여운-TEST"(앱ID 1500036)의 REST 키. 동의항목(이메일·연령대·출생연도)이 설정된 앱.
      # 운영 비즈앱 검수 완료 시 KAKAO_CLIENT_ID env로 교체. client-secret은 시크릿 → env로만 주입.
      client-id: ${KAKAO_CLIENT_ID:bba3e1d954ec548062bc3c13fd9f72bc}
      client-secret: ${KAKAO_CLIENT_SECRET:}
      # 동의항목 요청: 이메일 + 연령대 + 출생연도.
      # ⚠️ 카카오 콘솔 [동의항목]에서 각 항목 ON 필수(테스트앱은 팀원만 검수 없이 동작).
      #    미승인 항목을 scope에 넣으면 authorize 시 KOE006 → 로그인 깨짐. 콘솔 준비 전이면 KAKAO_SCOPE 로 줄여 둘 것.
      scope: ${KAKAO_SCOPE:account_email,age_range,birthyear}
    google:
      client-id: ${GOOGLE_CLIENT_ID:238940430553-ikggojb7ssr0knf6u3ga8f00npsuv0s3.apps.googleusercontent.com}
      client-secret: ${GOOGLE_CLIENT_SECRET:}

  # 공공데이터 전시 API(한눈에보는문화정보조회서비스, data.go.kr 15138937). (03_전시.md CATALOG 출처)
  # service-key: data.go.kr 일반 인증키. 공공데이터 오픈API 키라 저위험 + 재발급 가능해 yaml에 직접 둔다(팀 참고용).
  #   env(CULTURE_API_KEY)로 오버라이드 가능. 미설정·무효면 외부 동기화 스킵되고 데모 시드로 동작.
  public-data:
    culture:
      base-url: ${CULTURE_API_BASE_URL:https://apis.data.go.kr/B553457/cultureinfo}
      service-key: ${CULTURE_API_KEY:55aa921462823cce4b6aa1d36b0f5c318b0100a16af6fc56c89527e7353ad154}
      realm-code: D000        # 전시
      num-of-rows: 100
      max-pages: 5

  # 데모용 전시 시드. 켜면 부팅 시 표본 CATALOG/MOCK 전시를 적재한다(테이블이 비어 있을 때만).
  # 로컬 시연 전용 — 운영/테스트에서는 꺼 둔다(기본 false).
  exhibition:
    demo-seed:
      enabled: ${EXHIBITION_DEMO_SEED:false}

  # 자체 JWT 설정. secret은 시크릿 → 환경변수 주입 권장(기본값은 로컬 테스트 전용).
  jwt:
    secret: ${JWT_SECRET:local-dev-only-jwt-secret-please-change-min-32-bytes}
    access-ttl-seconds: 900        # access token 15분
    refresh-ttl-seconds: 1209600   # refresh token 14일

  # refresh 쿠키 속성. 로컬(http)은 secure off.
  auth:
    cookie:
      secure: false
      same-site: Lax

---
# 운영(EC2) 프로파일: 배포 시 SPRING_PROFILES_ACTIVE=prod 로 활성화된다.
spring:
  config:
    activate:
      on-profile: prod
app:
  cors:
    allowed-origin-patterns:
      - https://yeowun.vercel.app # 여운 Vercel 운영 도메인 (이것만 허용)
  oauth:
    # 운영 redirect_uri = 여운 프론트 운영 콜백 (콘솔 등록값과 일치). 필요 시 env로 override.
    redirect-uri: ${OAUTH_REDIRECT_URI:https://yeowun.vercel.app/login}
    allowed-redirect-uris:
      - https://yeowun.vercel.app/login
  # 운영: HTTPS(yeowun.vercel.app, Vercel 프록시로 same-origin)라 Secure 켜고 SameSite=Lax.
  auth:
    cookie:
      secure: true
      same-site: Lax
