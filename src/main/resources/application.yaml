spring:
  application:
    name: backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/mydatabase}
    username: ${SPRING_DATASOURCE_USERNAME:myuser}
    password: ${SPRING_DATASOURCE_PASSWORD:secret}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: 8080

# CORS 허용 오리진 (공개 정보 — 시크릿 아님).
# 기본(프로파일 없음) = 로컬 개발용. 운영 배포는 prod 프로파일에서 Vercel 도메인으로 override.
app:
  cors:
    allowed-origin-patterns:
      - http://localhost:3000   # 로컬 프론트(CRA 등)
      - http://localhost:5173   # 로컬 프론트(Vite 등)

---
# 운영(EC2) 프로파일: 배포 시 SPRING_PROFILES_ACTIVE=prod 로 활성화된다.
spring:
  config:
    activate:
      on-profile: prod
app:
  cors:
    allowed-origin-patterns:
      - https://modi.vercel.app # Vercel 운영 도메인 (이것만 허용)
