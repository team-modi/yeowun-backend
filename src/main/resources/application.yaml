spring:
  application:
    name: backend
  # webflux 의존(WebClient) 추가했지만 웹 스택은 서블릿(MVC) 유지.
  main:
    web-application-type: servlet
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/mydatabase}
    username: ${SPRING_DATASOURCE_USERNAME:myuser}
    password: ${SPRING_DATASOURCE_PASSWORD:secret}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        # prometheus: Alloy 에이전트가 스크랩해 Grafana Cloud로 remote_write.
        # ⚠️ 앱 포트가 공개(EC2 8080)라 actuator도 공개된다 — metrics와 동일 데이터라 노출 등급은 그대로지만,
        #    management 포트 분리/역프록시 차단은 별도 하드닝 과제(docs/observability-setup.md 참고).
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: modi-backend   # 모든 지표에 앱 라벨(다중 인스턴스 구분용)
    distribution:
      # HTTP 요청 지연을 히스토그램(_bucket)으로 노출 → PromQL histogram_quantile로 p50/p95/p99 계산·집계 가능.
      # (기본은 summary라 _bucket이 없어 percentile 계산 불가) 버킷 상·하한을 두어 카디널리티를 억제한다.
      percentiles-histogram:
        "[http.server.requests]": true
      minimum-expected-value:
        "[http.server.requests]": 5ms
      maximum-expected-value:
        "[http.server.requests]": 3s

server:
  port: 8080

# CORS 허용 오리진 (공개 정보 — 시크릿 아님).
# 기본(프로파일 없음) = 로컬 개발용. 운영 배포는 prod 프로파일에서 Vercel 도메인으로 override.
app:
  cors:
    allowed-origin-patterns:
      - http://localhost:3000   # 여운 프론트 로컬
      - http://localhost:3005   # 여운 프론트 로컬(대체 포트)
      - http://localhost:8080   # 백엔드 내장 HTML 테스트 페이지

  # OAuth 설정. client-id는 공개성 값이라 기본값을 둔다. client-secret은 시크릿 → 환경변수로만 주입.
  # redirect-uri는 콘솔에 등록된 값과 정확히 일치해야 한다(현재 테스트는 백엔드 내장 페이지 = :8080/login).
  oauth:
    redirect-uri: ${OAUTH_REDIRECT_URI:http://localhost:8080/login}
    # FE 주도 로그인에서 허용하는 redirectUri 화이트리스트 (로컬 프론트/테스트)
    allowed-redirect-uris:
      - http://localhost:3000/login
      - http://localhost:3005/login
      - http://localhost:8080/login
    kakao:
      # 테스트앱 "여운-TEST"(앱ID 1500036)의 REST 키. 동의항목(이메일·연령대·출생연도)이 설정된 앱.
      # 운영 비즈앱 검수 완료 시 KAKAO_CLIENT_ID env로 교체. client-secret은 시크릿 → env로만 주입.
      client-id: ${KAKAO_CLIENT_ID:bba3e1d954ec548062bc3c13fd9f72bc}
      client-secret: ${KAKAO_CLIENT_SECRET:}
      # 동의항목 요청: 이메일 + 연령대 + 출생연도.
      # ⚠️ 카카오 콘솔 [동의항목]에서 각 항목 ON 필수(테스트앱은 팀원만 검수 없이 동작).
      #    미승인 항목을 scope에 넣으면 authorize 시 KOE006 → 로그인 깨짐. 콘솔 준비 전이면 KAKAO_SCOPE 로 줄여 둘 것.
      scope: ${KAKAO_SCOPE:account_email,age_range,birthyear}
    google:
      client-id: ${GOOGLE_CLIENT_ID:238940430553-ikggojb7ssr0knf6u3ga8f00npsuv0s3.apps.googleusercontent.com}
      client-secret: ${GOOGLE_CLIENT_SECRET:}

  # 공공데이터 전시 API(한눈에보는문화정보조회서비스, data.go.kr 15138937). (03_전시.md CATALOG 출처)
  # service-key: data.go.kr 일반 인증키. 공공데이터 오픈API 키라 저위험 + 재발급 가능해 yaml에 직접 둔다(팀 참고용).
  #   env(CULTURE_API_KEY)로 오버라이드 가능. 미설정·무효면 외부 동기화 스킵되고 데모 시드로 동작.
  public-data:
    culture:
      base-url: ${CULTURE_API_BASE_URL:https://apis.data.go.kr/B553457/cultureinfo}
      service-key: ${CULTURE_API_KEY:55aa921462823cce4b6aa1d36b0f5c318b0100a16af6fc56c89527e7353ad154}
      realm-code: D000        # 전시
      num-of-rows: 100
      max-pages: 5
      timeout-seconds: ${CULTURE_API_TIMEOUT_SECONDS:15}  # 무응답 stall 시 스케줄러 스레드·DB 커넥션 영구 점유 방지

  # 데모용 전시 시드. 켜면 부팅 시 표본 CATALOG/MOCK 전시를 적재한다(테이블이 비어 있을 때만).
  # 로컬 시연 전용 — 운영/테스트에서는 꺼 둔다(기본 false).
  exhibition:
    demo-seed:
      enabled: ${EXHIBITION_DEMO_SEED:false}
    # 전시 카탈로그 정기 동기화 스케줄. sync.cron 시각에 목록 동기화 + 상세 보강을 수행한다(기본 매일 자정).
    sync:
      cron: ${EXHIBITION_SYNC_CRON:0 0 0 * * *}
    # 전시 장르 분류. classifier로 랜덤/AI 두 구현 중 하나를 주 분류기로 고른다(둘 다 빈으로 공존, 무중단 교체).
    #   random(기본, develop·로컬): 마스터에서 무작위 1개 — AI 호출·비용 없음. 운영(prod 프로파일)에서만 gemini(실제 AI 분류)로 override.
    #   gemini: api-key 미설정·429·오류 시 자동으로 random 폴백.
    genre:
      classifier: ${GENRE_CLASSIFIER:random}
    # 공공데이터(CATALOG) 보강 — 목록 동기화는 목록 필드만 적재하므로 장르(분류)·상세2(price 등)를 이어서 채운다.
    #   장르: 동기화(부팅 1회·매일 자정) "직후에만" 신규 적재분(미분류 행)을 배치로(배치당 AI 1콜) 분류한다.
    #        별도 주기 백필 없음 — 동기화가 신규만 추가하므로 미분류 행 = 방금 추가된 전시(멱등, 신규 없으면 no-op).
    #        부팅 분류는 데몬 스레드로 수행해 readiness/헬스체크를 막지 않는다.
    #   상세: 상세 미수집 행을 상세 API로 채워 price를 확보(무료 섹션이 실제로 뜨게 하는 근본 값). 매일 자정 동기화 때 함께 수행한다.
    enrich:
      genre-batch-size: ${ENRICH_GENRE_BATCH_SIZE:20}  # 60s 타임아웃 안에서 검증된 크기(키우면 ReadTimeout→랜덤 폴백 위험)
      genre-max-batches-per-run: ${ENRICH_GENRE_MAX_BATCHES:3}  # 회당 소량 → 무료 RPM 안 넘김(대량 백로그는 다음 동기화가 이어서 소진)
      detail-max-per-run: ${ENRICH_DETAIL_MAX_PER_RUN:150}

  # 리마인드(오늘의 여운) — 기록 작성 후 소환 대상이 되기까지의 경과 시간. 스케줄 발송이 아니라 조회 시점 판정(pull)이라
  #   이 값만 바꾸면 즉시 반영된다. 정식 기본 7d(운영 베타 한정 단축은 prod 프로파일 참고).
  remind:
    eligible-after: ${REMIND_ELIGIBLE_AFTER:7d}

  # 관리자 콘솔 로그인 자격(이메일 화이트리스트 + 공용 비밀번호). 로그인하면 admin_session 쿠키로 /api-admin/** 접근.
  #   ⚠️ 레포가 PUBLIC이라 값은 절대 여기 넣지 말 것 → env/Secret으로만 주입. 미설정이면 아무도 로그인 못 함(안전 기본값).
  #   ADMIN_EMAILS=a@x.com,b@y.com  ·  ADMIN_PASSWORD=<공용비번>
  admin:
    emails: ${ADMIN_EMAILS:}
    password: ${ADMIN_PASSWORD:}

  # AI 감상문 생성(질문/compose). provider 교체 가능 — claude(Anthropic) | gemini(Google).
  #   AI_PROVIDER로 어댑터를 전환한다(코드 변경 불필요). 예: AI_PROVIDER=gemini.
  #   api-key 미설정이면 AI 엔드포인트는 503(AI_DISABLED)로 응답하고 나머지 기능은 정상 동작한다.
  ai:
    provider: ${AI_PROVIDER:claude}
    # 미지정 시 provider별 기본 모델(claude-opus-4-8 / gemini-2.5-flash-lite). gemini 기본을 flash-lite로 —
    #   무료 일일 한도가 flash보다 훨씬 크고 감상문 질문/다듬기엔 품질 충분. 장르 분류(app.ai.gemini, 기본 flash)와
    #   모델을 다르게 유지해 무료 한도 버킷을 분리한다(같은 모델로 맞추면 한도를 공유하게 되니 주의).
    model: ${AI_MODEL:}
    # 키는 provider와 짝을 이뤄 명시한다(교차 오염 방지): 공통 AI_API_KEY > Claude ANTHROPIC_API_KEY.
    #   gemini 사용 시엔 AI_PROVIDER=gemini + AI_API_KEY=<Gemini 키>(예: AI_API_KEY=${GEMINI_API_KEY}).
    #   ※ GEMINI_API_KEY를 여기 자동 폴백에 넣지 않는다 — 배포 env에 GEMINI_API_KEY만 있고 provider=claude면
    #     Claude 어댑터가 Gemini 키를 오용(AI_GENERATION_FAILED)하기 때문. 장르 분류는 별도로 app.ai.gemini에서 GEMINI_API_KEY 사용.
    api-key: ${AI_API_KEY:${ANTHROPIC_API_KEY:}}
    max-tokens: ${AI_MAX_TOKENS:1024}
    timeout-seconds: ${AI_TIMEOUT_SECONDS:30}     # 외부 LLM 호출 타임아웃(워커 스레드 장기 점유 방지)
    rate-limit-seconds: ${AI_RATE_LIMIT_SECONDS:3} # 사용자당 AI 호출 최소 간격(반복 클릭 폭주 방지)
    max-retries: ${AI_MAX_RETRIES:2}               # 429(무료 RPM 순간 초과) 시 재시도 횟수(Retry-After 존중, 소진 시 AI_RATE_LIMITED)
    max-retry-delay-seconds: ${AI_MAX_RETRY_DELAY_SECONDS:4}  # 재시도 백오프 상한(대화형이라 과도한 대기 방지)

    # 전시 장르 분류용 Gemini(무료 한도). api-key 미설정이면 AI 분류기가 random으로 폴백(나머지 기능 정상).
    #   model 기본을 flash로 — 감상문 AI(app.ai, 기본 flash-lite)와 "서로 다른 모델"을 써서 무료 한도 버킷을 분리한다
    #   (Gemini 무료 한도는 모델별 — 장르 분류가 감상문 AI 한도를 갉아먹지 않게). 장르는 동기화 직후 신규분만
    #   분류하므로 호출량이 적어 flash의 상대적으로 작은 일일 한도로도 충분하다.
    gemini:
      base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
      api-key: ${GEMINI_API_KEY:}
      model: ${GEMINI_MODEL:gemini-2.5-flash}
      timeout-seconds: ${GEMINI_TIMEOUT_SECONDS:60}   # 배치(초기화)는 여러 전시를 한 응답으로 받아 오래 걸림 → 여유 있게(단일 호출·초과 시 랜덤 폴백)
      max-retries: ${GEMINI_MAX_RETRIES:1}                    # 429 시 재시도 횟수(Retry-After 존중)
      max-retry-delay-seconds: ${GEMINI_MAX_RETRY_DELAY_SECONDS:2}  # 재시도 백오프 상한(부팅 지연 방지)

  # 자체 JWT 설정. secret은 시크릿 → 환경변수 주입 권장(기본값은 로컬 테스트 전용).
  jwt:
    secret: ${JWT_SECRET:local-dev-only-jwt-secret-please-change-min-32-bytes}
    access-ttl-seconds: 900        # access token 15분
    refresh-ttl-seconds: 1209600   # refresh token 14일

  # refresh 쿠키 속성. 로컬(http)은 secure off.
  auth:
    cookie:
      secure: false
      same-site: Lax

---
# 운영(EC2) 프로파일: 배포 시 SPRING_PROFILES_ACTIVE=prod 로 활성화된다.
spring:
  config:
    activate:
      on-profile: prod
app:
  exhibition:
    # 운영에서만 실제 AI(gemini) 장르 분류를 쓴다. develop·로컬(기본 프로파일)은 random(무비용). 필요 시 env로 override.
    genre:
      classifier: ${GENRE_CLASSIFIER:gemini}
  # ⚠️ 베타 한정: 리마인드 소환 대기를 1분으로 단축(2~3일 베타에서 즉시 검증용, 리마인드는 조회 시점 판정이라 값만 줄이면 됨).
  #   베타 종료 후 REMIND_ELIGIBLE_AFTER=7d 주입(또는 이 줄 제거로 기본 7d 복귀).
  remind:
    eligible-after: ${REMIND_ELIGIBLE_AFTER:1m}
  cors:
    allowed-origin-patterns:
      - https://yeowun.vercel.app      # 여운 Vercel 운영 도메인
      - https://yeowun-demo.vercel.app # 여운 베타테스트 데모 프론트(별도 레포 yeowun-demo)
  oauth:
    # 운영 redirect_uri = 여운 프론트 운영 콜백 (콘솔 등록값과 일치). 필요 시 env로 override.
    redirect-uri: ${OAUTH_REDIRECT_URI:https://yeowun.vercel.app/login}
    allowed-redirect-uris:
      - https://yeowun.vercel.app/login
      - https://yeowun-demo.vercel.app/login # 데모 프론트 카카오 콜백 (콘솔에도 동일 등록 필요)
  # 운영: HTTPS(yeowun.vercel.app, Vercel 프록시로 same-origin)라 Secure 켜고 SameSite=Lax.
  auth:
    cookie:
      secure: true
      same-site: Lax
